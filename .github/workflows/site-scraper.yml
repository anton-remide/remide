name: Site Scraper (Cheerio)

on:
  schedule:
    # Daily at 06:00 UTC — runs AFTER enrichment (04:00), catches what Firecrawl missed
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max entities to process (0 = all remaining)'
        required: false
        default: '50000'
      country:
        description: 'Country code (e.g. PL, CA, or leave empty for all)'
        required: false
        default: ''
      force:
        description: 'Re-scrape already enriched entities'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --force

      - name: Run site scraper worker
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS="--limit ${{ inputs.limit || '50000' }}"
          if [ -n "${{ inputs.country }}" ]; then
            ARGS="$ARGS --country ${{ inputs.country }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running site scraper: $ARGS"
          npx tsx workers/site-scraper/run.ts $ARGS

      - name: Summary
        if: always()
        run: echo "Site scraper completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
