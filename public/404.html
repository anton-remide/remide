<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RemiDe — Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages hits a 404 (e.g. /jurisdictions/CH),
      // this script encodes the path into a query param and redirects
      // to index.html, which then restores the correct URL via
      // history.replaceState.
      //
      // Based on: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0; // root deploy at tracker.remide.xyz
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting&hellip;
  </body>
</html>
